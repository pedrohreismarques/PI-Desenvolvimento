<!DOCTYPE html>
<html lang="pt-br">

<head>

	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Cadastro do Aluno</title>

	<link rel="stylesheet" href="Style.css">

	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
	<link rel="icon" type="image/png" href="img/mascotecabeca.png">
</head>

<body>

	<div class="container tela-cadastro">

		<form action="cadastrado.html" method="get">

			<img id="robo" src="img/mascotinhomenor.png" alt="Robo´">

			<h1> <strong>Cadastro do Aluno</strong></h1>

			<p>
				<strong>Preencha suas informações para
					<br> continuar o acesso :</strong>
			</p>

			<input type="hidden" name="id" value="${id}">

			<input type="text" id="nome" name="nome" placeholder="Nome Completo" required>

			<input type="date" id="nascimento" name="nascimento" placeholder="Data de Nascimento" required>


			<select name="curso" required>

				<option value="" disabled selected>
					Selecione seu curso
				</option>

				<option value="Aprendizagem">
					Aprendizagem
				</option>

				<option value="Estetica">
					Estetica
				</option>

				<option value="Fotografia">
					Fotografia
				</option>

				<option value="Qualificacao profissional">
					Qualificacao profissional
				</option>

				<option value="Tecnico em Informatica">
					Tecnico em Informatica
				</option>
			</select>

			<button type="submit" class="btn-entrar" onclick="mostrarLoading()">
				Cadastrar
			</button>


		</form>
		<!-- TECLADO -->

		<div id="teclado">

			<div class="linha">
				<button type="button" class="tecla">1</button>
				<button type="button" class="tecla">2</button>
				<button type="button" class="tecla">3</button>
				<button type="button" class="tecla">4</button>
				<button type="button" class="tecla">5</button>
				<button type="button" class="tecla">6</button>
				<button type="button" class="tecla">7</button>
				<button type="button" class="tecla">8</button>
				<button type="button" class="tecla">9</button>
				<button type="button" class="tecla">0</button>
			</div>

			<div class="linha">
				<button type="button" class="tecla">q</button>
				<button type="button" class="tecla">w</button>
				<button type="button" class="tecla">e</button>
				<button type="button" class="tecla">r</button>
				<button type="button" class="tecla">t</button>
				<button type="button" class="tecla">y</button>
				<button type="button" class="tecla">u</button>
				<button type="button" class="tecla">i</button>
				<button type="button" class="tecla">o</button>
				<button type="button" class="tecla">p</button>
			</div>

			<div class="linha">
				<button type="button" class="tecla">a</button>
				<button type="button" class="tecla">s</button>
				<button type="button" class="tecla">d</button>
				<button type="button" class="tecla">f</button>
				<button type="button" class="tecla">g</button>
				<button type="button" class="tecla">h</button>
				<button type="button" class="tecla">j</button>
				<button type="button" class="tecla">k</button>
				<button type="button" class="tecla">l</button>
			</div>

			<div class="linha">
				<button type="button" class="tecla especial" id="shift">⇧</button>

				<button type="button" class="tecla">z</button>
				<button type="button" class="tecla">x</button>
				<button type="button" class="tecla">c</button>
				<button type="button" class="tecla">v</button>
				<button type="button" class="tecla">b</button>
				<button type="button" class="tecla">n</button>
				<button type="button" class="tecla">m</button>
			</div>

			<div class="linha">
				<button type="button" class="tecla especial" id="espaco">
					ESPAÇO
				</button>

				<button type="button" class="tecla especial" id="backspace">
					⌫
				</button>
			</div>

		</div>

	</div>


	</div>

	<script src="script.js"></script>

</body>

</html>
