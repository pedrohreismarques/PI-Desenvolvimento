<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro do Aluno</title>

    <link rel="stylesheet" href="Style.css">

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

</head>

<body>

    <div class="container tela-cadastro">

        <img id="robo" src="img/mascotinhomenor.png" alt="Robô">

        <h1> <strong>Cadastro do Aluno</strong></h1>

        <p>
            <strong>Preencha suas informações para
                <br> continuar o acesso :</strong>
        </p>

        <input type="text" placeholder="Nome completo">

        <input type="email" placeholder="E-mail">

        <select required>

            <option value="" disabled selected>
                Selecione seu curso
            </option>

            <option>Técnico em Informática</option>

            <option>Estética</option>

        </select>

        <button class="btn">
            Cadastrar
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
