<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro do Aluno</title>

    <link rel="stylesheet" href="Style.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/mascotinhomenor.png">
</head>

<body>

    <div class="container tela-cadastro">

        <img id="robo" src="img/mascotinhomenor.png" alt="Robô">

        <h1> <strong>Cadastro do Visitante</strong></h1>

        <p>
            <strong>Preencha suas informações para
                <br> continuar o acesso :</strong>
        </p>

        <input type="text" placeholder="Nome completo">

        <input type="date" placeholder="Data de Nascimento">

        <a href="cadastrado.html" class="btn-entrar">
            Cadastrar
        </a>

    </div>

    <script src="script.js"></script>

</body>

</html>
